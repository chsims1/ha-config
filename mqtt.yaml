#########################  Weather Variables  ###################################
#  Temperature Outside
      - name: "Weather Temp Out"
        unique_id: "weather_temp_out"
        state_topic: "weather"
        value_template: '{{ value_json.OutdoorTemp }}'
        unit_of_measurement: "°C"
#  Temperature Inside    
      - name: "Weather Temp In"
        unique_id: "weather_temp_in"
        state_topic: "weather"
        value_template: '{{ value_json.IndoorTemp }}'
        unit_of_measurement: "°C"
#  Temperature Maximum    
      - name: "Weather Temp Max"
        unique_id: "weather_temp_max"
        state_topic: "weather"
        value_template: '{{ value_json.temp_out_max }}°C at {{ value_json.temp_out_max_t}}'
#  Temperature Minimum
      - name: "Weather Temp Min"
        unique_id: "weather_temp_min"
        state_topic: "weather"
        value_template: '{{ value_json.temp_out_min }}°C at {{ value_json.temp_out_min_t}}'
#  Rain Today
      - name: "weather Rain"
        unique_id: "weather_rain"
        state_topic: "weather"
        value_template: '{{ value_json.RainToday }}mm'
#  Wind Average Speed & Direction  
      - name: "Weather Wind"
        unique_id: "weather_wind"
        state_topic: "weather"
        value_template: '{{ value_json.WindAverage }}mph from the {{ value_json.AVGBearing}}'
#  Humidity Outside
      - name: "Weather Humidity"
        unique_id: "weather_humidity"
        state_topic: "weather"
        value_template: '{{ value_json.OutdoorHum }}'
        unit_of_measurement: "%"
#  Humidity Inside
      - name: "Humidity Inside"
        unique_id: "weather_humidity_in"
        state_topic: "weather"
        value_template: '{{ value_json.IndoorHum }}'
        unit_of_measurement: "%"

#  Time
      - name: "Weather Reading Time"
        unique_id: "weather_reading_time"
        state_topic: "weather"
        value_template: '{{ value_json.LastDataRead }}'
