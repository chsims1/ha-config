#########################  Hildebrand Glow Meter Reading  #######################
######  Gas Sensor
# Unit Cost
      - name: "Gas Unit Cost"
        unique_id: "gas_unit_cost"
        state_topic: "glow/4C11AEADF328/SENSOR/gasmeter"
        value_template: "£{{ (value_json['gasmeter']['energy']['import']['price']['unitrate']) | round(3) }}"
# Standing Charge
      - name: "Gas Standing Charge"
        unique_id: "gas_standing_charge"
        state_topic: "glow/4C11AEADF328/SENSOR/gasmeter"
        value_template: "£{{ (value_json['gasmeter']['energy']['import']['price']['standingcharge']) | round(3) }}"
# Gas Today 
      - name: "Gas Today"
        unique_id: "gas_today"
        state_topic: "glow/4C11AEADF328/SENSOR/gasmeter"
        value_template: "{{ (value_json['gasmeter']['energy']['import']['day'])  | round(3) }}"
        unit_of_measurement: "kWh"
        state_class: "total_increasing"
        device_class: "energy"

# Gas Today Cost
      - name: "Gas Today Cost"
        unique_id: "gas_today_cost"
        state_topic: "glow/4C11AEADF328/SENSOR/gasmeter"
        value_template: "£{{ ((value_json['gasmeter']['energy']['import']['day']) * (value_json['gasmeter']['energy']['import']['price']['unitrate']) + (value_json['gasmeter']['energy']['import']['price']['standingcharge'])) | round(2) }}"

######  Electricity Sensor
# Electricity Import Cumulative (never resets - needed for utility_meter)
      - name: "Electricity Import Cumulative"
        unique_id: "electricity_import_cumulative"
        state_topic: "glow/4C11AEADF328/SENSOR/electricitymeter"
        value_template: "{{ (value_json['electricitymeter']['energy']['import']['cumulative']) | round(3) }}"
        unit_of_measurement: "kWh"
        state_class: "total_increasing"
        device_class: "energy"
        force_update: true
# Current Power Consumption
      - name: "Electricity Grid Power"
        unique_id: "electricity_grid_power"
        state_topic: "glow/4C11AEADF328/SENSOR/electricitymeter"
        value_template: "{{ (value_json['electricitymeter']['power']['value']) | round(5) }}"
        unit_of_measurement: "kW"
        state_class: "measurement"
        device_class: "power"
# Unit Cost
      - name: "Electricity Unit Cost"
        unique_id: "electricity_unit_cost"
        state_topic: "glow/4C11AEADF328/SENSOR/electricitymeter"
        value_template: "£{{ (value_json['electricitymeter']['energy']['import']['price']['unitrate']) | round(3) }}"

# Standing Charge
      - name: "Electricity Standing Charge"
        unique_id: "electricity_standing_charge"
        state_topic: "glow/4C11AEADF328/SENSOR/electricitymeter"
        value_template: "£{{ (value_json['electricitymeter']['energy']['import']['price']['standingcharge']) | round(3) }}"

# Electricity Today 
      - name: "Electricity Import Today"
        unique_id: "electricity_today"
        state_topic: "glow/4C11AEADF328/SENSOR/electricitymeter"
        value_template: "{{ (value_json['electricitymeter']['energy']['import']['day'])  | round(2) }}"
        unit_of_measurement: "kWh"
        state_class: "total_increasing"
        device_class: "energy"
        force_update: true

# Electricity Export Cumulative
      - name: "Electricity Export"
        unique_id: "electricity_export"
        state_topic: "glow/4C11AEADF328/SENSOR/electricitymeter"
        value_template: "{{ (value_json['electricitymeter']['energy']['export']['cumulative'])  | round(1) }}"
        unit_of_measurement: "kWh"
        state_class: "total_increasing"
        device_class: "energy"
        

