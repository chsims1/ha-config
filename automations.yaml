###################################### Electricity Utility Meter ####################################################################
- alias: "Electricity Tariff - Switch to Peak"
  trigger:
    - platform: time
      at: "06:00:00"
    - platform: homeassistant
      event: start
  condition:
    - condition: time
      after: "06:00:00"
      before: "00:00:00"
  action:
    - service: select.select_option
      target:
        entity_id: select.electricity_import_meter
      data:
        option: peak

- alias: "Electricity Tariff - Switch to Off-Peak"
  trigger:
    - platform: time
      at: "00:00:00"
    - platform: homeassistant
      event: start
  condition:
    - condition: time
      after: "00:00:00"
      before: "06:00:00"
  action:
    - service: select.select_option
      target:
        entity_id: select.electricity_import_meter
      data:
        option: offpeak
