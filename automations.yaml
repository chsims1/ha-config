######################## Ohme Charger ############## Also see configuration.yaml

- id: ohme_record_session_start
  alias: "Ohme - Record session start energy"
  trigger:
    - trigger: state
      entity_id: sensor.ohme_epod_energy
  condition:
    - condition: template
      value_template: >
        {{ trigger.from_state.state | float(0) == 0 and 
           trigger.to_state.state | float(0) > 0 }}
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.ohme_session_start_energy
      data:
        value: "{{ trigger.to_state.state | float(0) }}"

- id: ohme_add_session_to_lifetime
  alias: "Ohme - Add session energy to lifetime total"
  trigger:
    - trigger: state
      entity_id: sensor.ohme_epod_energy
  condition:
    - condition: template
      value_template: >
        {{ trigger.from_state.state | float(0) > 0 and 
           trigger.to_state.state | float(0) == 0 }}
  action:
    - action: input_number.set_value
      target:
        entity_id: input_number.ohme_lifetime_energy
      data:
        value: >
          {{ (states('input_number.ohme_lifetime_energy') | float(0)) + 
             (trigger.from_state.state | float(0)) - 
             (states('input_number.ohme_session_start_energy') | float(0)) }}